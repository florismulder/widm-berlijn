<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spelleider Dashboard - WIDM Berlijn</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Admin-specific: bredere container voor 5 teams */
        .container {
            max-width: 95% !important;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="widm-logo.jpg" alt="Wie is de Mol Logo" class="header-logo">
            <h1>🕵️ Spelleider dashboard</h1>
            <p class="subtitle">Wie is de Mol? - Berlijn</p>
        </header>

        <div class="dashboard-sectie">
            <!-- Timer sectie -->
            <div class="timer-sectie">
                <div id="dashboard-timer" class="dashboard-timer">
                    ⏱️ <span id="dashboard-timer-tekst">2:00:00</span>
                </div>
                <button id="start-spel-btn" onclick="bevestigStart()" class="start-btn">🚀 START HET SPEL</button>
                <div id="spel-gestart-badge" class="status-badge" style="display:none; background: #8bc34a; margin-top: 10px;">
                    ✅ Spel is gestart
                </div>
            </div>

            <!-- Teams overzicht -->
            <div id="teams-container"></div>
        </div>
    </div>

    <!-- Bevestig popup -->
    <div id="bevestig-overlay" class="popup-overlay hidden">
        <div class="popup-box">
            <div class="popup-header">
                <span>🕵️ Spelleider Dashboard</span>
            </div>
            <div class="popup-body">
                <p id="bevestig-tekst">Weet je zeker dat je het spel wilt starten?</p>
            </div>
            <div class="popup-footer">
                <button onclick="startSpel()" style="background: #8bc34a;">✅ Ja, start!</button>
                <button onclick="sluitBevestig()" style="background: #666; margin-left: 10px;">Annuleer</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxtZUrnqR37X_HxUodU7U5AlYwrIhbtA8xgGDvlzqYReY86UrMcqIOvyJ1osRkTX-Alww/exec";
        const SPEL_DUUR = 2 * 60 * 60 * 1000;
        let dashboardInterval = null;
        let timerInterval = null;

        async function apiCall(action, params = {}, method = 'GET') {
            try {
                const url = new URL(API_URL);
                url.searchParams.append('action', action);
                
                if (method === 'GET') {
                    Object.keys(params).forEach(key => {
                        url.searchParams.append(key, params[key]);
                    });
                    const response = await fetch(url);
                    return await response.json();
                } else {
                    const response = await fetch(API_URL + '?action=' + action, {
                        method: 'POST',
                        body: JSON.stringify(params)
                    });
                    return await response.json();
                }
            } catch (error) {
                console.error('API Error:', error);
                return null;
            }
        }

        function bevestigStart() {
            document.getElementById('bevestig-overlay').classList.remove('hidden');
        }

        function sluitBevestig() {
            document.getElementById('bevestig-overlay').classList.add('hidden');
        }

        async function startSpel() {
            sluitBevestig();
            const result = await apiCall('startSpel', {}, 'POST');
            if (result && result.success) {
                alert('✅ Spel is gestart! Alle teams kunnen nu beginnen.');
                updateDashboard();
            } else {
                alert('❌ Fout bij starten van spel. Probeer opnieuw.');
            }
        }

        function startDashboardTimer(startDatum) {
            if (timerInterval) clearInterval(timerInterval);
            
            const timerEl = document.getElementById('dashboard-timer');
            const timerTekstEl = document.getElementById('dashboard-timer-tekst');
            
            timerInterval = setInterval(() => {
                const nu = new Date().getTime();
                const verstreken = nu - startDatum;
                const resterend = SPEL_DUUR - verstreken;

                if (resterend <= 0) {
                    clearInterval(timerInterval);
                    timerTekstEl.textContent = 'Spel afgelopen!';
                    timerEl.classList.add('urgent');
                    return;
                }

                const uren = Math.floor(resterend / (1000 * 60 * 60));
                const minuten = Math.floor((resterend % (1000 * 60 * 60)) / (1000 * 60));
                const seconden = Math.floor((resterend % (1000 * 60)) / 1000);

                timerTekstEl.textContent = `${uren}:${String(minuten).padStart(2, '0')}:${String(seconden).padStart(2, '0')}`;

                if (resterend < 15 * 60 * 1000) {
                    timerEl.classList.add('urgent');
                }
            }, 1000);
        }

        async function updateDashboard() {
            const data = await apiCall('getDashboard');
            
            if (!data || data.error) {
                console.error('Fout bij ophalen dashboard:', data?.error);
                return;
            }

            // Update timer en spel status
            if (data.spelGestart) {
                document.getElementById('spel-gestart-badge').style.display = 'block';
                document.getElementById('start-spel-btn').style.display = 'none';
                
                if (data.startTijd && !timerInterval) {
                    const startDatum = new Date(data.startTijd).getTime();
                    startDashboardTimer(startDatum);
                }
            } else {
                document.getElementById('spel-gestart-badge').style.display = 'none';
                document.getElementById('start-spel-btn').style.display = 'block';
            }

            // Render teams
            const container = document.getElementById('teams-container');
            container.innerHTML = '';

            data.teams.forEach(team => {
                const teamCard = document.createElement('div');
                teamCard.className = 'team-card';
                
                // Status badge kleur
                let statusClass = 'status-info';
                let statusTekst = team.status;
                
                if (team.status === 'Wachten_op_Startlocatie_Upload') {
                    statusClass = 'status-info';
                    statusTekst = '📍 Wacht op startlocatie upload';
                } else if (team.status === 'Wachten_op_Startlocatie_Goedkeuring') {
                    statusClass = 'status-warning';
                    statusTekst = '📍 Wacht op startlocatie goedkeuring';
                } else if (team.status === 'Startlocatie_Goedgekeurd') {
                    statusClass = 'status-success';
                    statusTekst = '✅ Startlocatie goedgekeurd';
                } else if (team.status === 'Wachten_op_Upload') {
                    statusClass = 'status-info';
                    statusTekst = '⏳ Wacht op foto upload';
                } else if (team.status === 'Wachten_op_Goedkeuring') {
                    statusClass = 'status-warning';
                    statusTekst = '📸 Wacht op goedkeuring';
                } else if (team.status === 'Goedgekeurd') {
                    statusClass = 'status-success';
                    statusTekst = '✅ Goedgekeurd';
                }

                // Leden badges
                const ledenHTML = team.leden.map(lid => {
                    const isCaptain = lid === team.captainNaam;
                    return `<span class="lid-badge ${isCaptain ? 'captain-badge' : ''}">${isCaptain ? '🎖️ ' : ''}${lid}</span>`;
                }).join('');

                // Foto sectie
                let fotoSectie = '';
                
                if (team.status === 'Wachten_op_Startlocatie_Goedkeuring' && team.startlocatieFotoUrl) {
                    // Startlocatie foto goedkeuring
                    fotoSectie = `
                        <div class="foto-sectie">
                            <a href="${team.startlocatieFotoUrl}" target="_blank" class="foto-link">📍 Bekijk startlocatie foto</a>
                            <div class="actie-knoppen">
                                <button onclick="keurStartlocatieGoed('${team.teamcode}')" class="btn-goedkeuren">✅ Goedkeuren</button>
                                <button onclick="keurStartlocatieAf('${team.teamcode}')" class="btn-afkeuren">❌ Afkeuren</button>
                            </div>
                        </div>
                    `;
                } else if (team.status === 'Wachten_op_Goedkeuring' && team.fotoUrl) {
                    // Normale opdracht foto goedkeuring
                    fotoSectie = `
                        <div class="foto-sectie">
                            <a href="${team.fotoUrl}" target="_blank" class="foto-link">📸 Bekijk foto</a>
                            <div class="actie-knoppen">
                                <button onclick="keurGoed('${team.teamcode}')" class="btn-goedkeuren">✅ Goedkeuren</button>
                                <button onclick="keurAf('${team.teamcode}')" class="btn-afkeuren">❌ Afkeuren</button>
                            </div>
                        </div>
                    `;
                }

                teamCard.innerHTML = `
                    <div class="team-header">
                        <h3>${team.teamnaam}</h3>
                        <span class="team-code">${team.teamcode}</span>
                    </div>
                    <div class="team-info">
                        <div class="leden-sectie">
                            ${ledenHTML}
                        </div>
                        <div class="locatie-info">
                            <strong>📍 Locatie:</strong> ${team.huidigeLocatie || 'Nog niet gestart'}
                        </div>
                        <div class="status-sectie">
                            <span class="status-badge ${statusClass}">${statusTekst}</span>
                        </div>
                    </div>
                    ${fotoSectie}
                `;

                container.appendChild(teamCard);
            });
        }

        async function keurStartlocatieGoed(teamcode) {
            const result = await apiCall('keurStartlocatieGoed', { teamcode }, 'POST');
            if (result && result.success) {
                updateDashboard();
            } else {
                alert('Fout bij goedkeuren. Probeer opnieuw.');
            }
        }

        async function keurStartlocatieAf(teamcode) {
            const result = await apiCall('keurStartlocatieAf', { teamcode }, 'POST');
            if (result && result.success) {
                alert('❌ Foto afgekeurd. Team moet opnieuw een foto uploaden.');
                updateDashboard();
            } else {
                alert('Fout bij afkeuren. Probeer opnieuw.');
            }
        }

        async function keurGoed(teamcode) {
            const result = await apiCall('keurGoed', { teamcode }, 'POST');
            if (result && result.success) {
                updateDashboard();
            } else {
                alert('Fout bij goedkeuren. Probeer opnieuw.');
            }
        }

        async function keurAf(teamcode) {
            const result = await apiCall('keurAf', { teamcode }, 'POST');
            if (result && result.success) {
                alert('❌ Foto afgekeurd. Team moet opnieuw een foto uploaden.');
                updateDashboard();
            } else {
                alert('Fout bij afkeuren. Probeer opnieuw.');
            }
        }

        // Start dashboard updates
        window.onload = function() {
            updateDashboard();
            dashboardInterval = setInterval(updateDashboard, 10000); // Update elke 10 seconden
        };
    </script>

    <style>
        .dashboard-sectie {
            padding: 20px 0;
        }

        #teams-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            max-width: 100%;
            margin: 0 auto;
        }

        .team-card {
            min-width: 0; /* Fix voor grid overflow */
        }

        /* Op kleine schermen toch responsive maken */
        @media (max-width: 768px) {
            #teams-container {
                grid-template-columns: 1fr;
            }
        }

        .timer-sectie {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: #1a1a1a;
            border-radius: 16px;
            border: 2px solid #2D5016;
        }

        .dashboard-timer {
            font-size: 3em;
            font-weight: bold;
            color: #8bc34a;
            margin-bottom: 20px;
            letter-spacing: 3px;
        }

        .dashboard-timer.urgent {
            color: #ff5252;
            animation: pulse 1s infinite;
        }

        .start-btn {
            font-size: 1.3em;
            padding: 20px 40px;
            background: #8bc34a;
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
        }

        .start-btn:hover {
            background: #9ccc65;
            transform: scale(1.05);
        }

        .team-card {
            background: #1a1a1a;
            border: 2px solid #2D5016;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .team-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }

        .team-header h3 {
            margin: 0;
            color: #8bc34a;
            font-size: 1.5em;
        }

        .team-code {
            background: #2D5016;
            padding: 5px 15px;
            border-radius: 8px;
            font-size: 0.9em;
            color: #8bc34a;
        }

        .team-info {
            margin-bottom: 15px;
        }

        .leden-sectie {
            margin-bottom: 15px;
        }

        .lid-badge {
            display: inline-block;
            background: #2a2a2a;
            padding: 8px 15px;
            border-radius: 8px;
            margin: 5px;
            font-size: 0.9em;
            border: 1px solid #444;
        }

        .captain-badge {
            background: #2D5016;
            border-color: #8bc34a;
            color: #8bc34a;
        }

        .locatie-info {
            margin: 10px 0;
            font-size: 0.95em;
            color: #ccc;
        }

        .status-sectie {
            margin: 15px 0;
        }

        .status-badge {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-info {
            background: #1e3a8a;
            color: #93c5fd;
        }

        .status-warning {
            background: #854d0e;
            color: #fde047;
        }

        .status-success {
            background: #166534;
            color: #86efac;
        }

        .foto-sectie {
            margin-top: 20px;
            padding: 20px;
            background: #0a0a0a;
            border-radius: 12px;
            border: 1px solid #333;
        }

        .foto-link {
            display: inline-block;
            background: #2D5016;
            color: #8bc34a;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            margin-bottom: 15px;
            transition: all 0.3s;
            font-weight: bold;
        }

        .foto-link:hover {
            background: #3a6b1f;
            transform: scale(1.05);
        }

        .actie-knoppen {
            display: flex;
            gap: 10px;
        }

        .btn-goedkeuren, .btn-afkeuren {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-goedkeuren {
            background: #166534;
            color: #86efac;
        }

        .btn-goedkeuren:hover {
            background: #14532d;
        }

        .btn-afkeuren {
            background: #7f1d1d;
            color: #fca5a5;
        }

        .btn-afkeuren:hover {
            background: #991b1b;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
    </style>
</body>
</html>
